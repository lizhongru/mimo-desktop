<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiMo Desktop</title>
  </head>
  <body class="bg-zinc-950 text-zinc-100">
    <script>
      // Apply theme synchronously before first paint to prevent flash
      (function() {
        try {
          // In Wails, config is stored on disk; we default to dark and
          // initFromConfig will correct it once the Go bridge is ready.
          // For non-Wails (browser dev), check localStorage fallback.
          var stored = null;
          try { stored = localStorage.getItem("mimo-theme"); } catch(e) {}
          var theme = stored || "dark";
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch(e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
